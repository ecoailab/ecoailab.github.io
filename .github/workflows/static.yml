name: Legacy static Pages deploy disabled

on:
  # Disabled by default to avoid racing the primary Hugo Pages workflow.
  # Run manually only when intentionally deploying prebuilt static files.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Explain disabled workflow
        run: |
          echo "This legacy static workflow is intentionally disabled."
          echo "Use .github/workflows/hugo.yml for the canonical HugoBlox build and GitHub Pages deployment."
