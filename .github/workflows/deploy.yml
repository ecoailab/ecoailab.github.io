name: Deploy and Optimize static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Setup Node.js for Pagefind
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Generate Pagefind search index
      - name: Build Pagefind Index
        run: npx pagefind --site . --output-path pagefind
      
      # Optimize images
      - name: Optimize Images
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: true
          ignorePaths: 'node_modules/**,build/**,.git/**,pagefind/**'
      
      # Generate sitemap
      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://ecoailab.github.io/
          path-to-root: .
          exclude-path: |
            pagefind
            .github
      
      # Setup Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # Upload optimized artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse-ci:
    needs: build-and-optimize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://ecoailab.github.io/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
