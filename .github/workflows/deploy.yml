name: Deploy and Optimize static content to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-optimize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # Optimize images
      - name: Optimize Images
        uses: calibreapp/image-actions@main
        with:
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          compressOnly: true
          ignorePaths: 'node_modules/**,build/**,.git/**'
      
      # Minify HTML
      - name: Minify HTML
        uses: docker://docker.io/minify/html-minifier-terser:latest
        with:
          args: html-minifier-terser --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype --minify-css --minify-js -o index.html index.html
        continue-on-error: true
      
      # Setup Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      # Upload optimized artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      
      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse-ci:
    needs: build-and-optimize
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: |
            https://ecoailab.github.io/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: './lighthouserc.json'
