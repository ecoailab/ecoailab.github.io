<script>
  document.addEventListener('DOMContentLoaded', function () {
    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // Scroll-reveal for content sections (progressive enhancement)
    var els = document.querySelectorAll('.page-body section[id]:not(#about)');
    if (!reduce && 'IntersectionObserver' in window && els.length) {
      els.forEach(function (el) { el.classList.add('claude-reveal'); });
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -8% 0px' });
      els.forEach(function (el) { io.observe(el); });
    }

    // Header gains a soft shadow once scrolled
    var hdr = document.querySelector('#site-header');
    if (hdr) {
      var onScroll = function () { hdr.classList.toggle('is-scrolled', window.scrollY > 8); };
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();
    }
  });
</script>
