{{- define "main" -}}
<main class="mx-auto max-w-4xl px-6 py-12 lg:px-8">
  <article class="prose prose-slate max-w-none dark:prose-invert">
    <header class="mb-10 border-b border-slate-200 pb-8 dark:border-slate-700">
      <h1 class="mb-4 text-3xl font-bold tracking-tight text-slate-950 dark:text-slate-50 md:text-4xl">{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="text-lg text-slate-600 dark:text-slate-300">{{ . }}</p>
      {{ end }}
    </header>
    {{ .Content }}
  </article>
</main>
{{- end -}}
